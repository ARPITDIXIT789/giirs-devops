apiVersion: apps/v1
kind: Deployment
metadata:
  name: giirs-app
  labels:
    app: giirs-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: giirs-app
  template:
    metadata:
      labels:
        app: giirs-app
    spec:
      containers:
      - name: giirs-app
        image: arpitdixit78/giirs-app:latest
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
